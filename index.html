<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:url('mountain.jpg') center center/cover no-repeat fixed;
min-height:100vh;
color:white;
}

.overlay{
background:rgba(0,0,0,.65);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:700px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
padding:40px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.profile{
width:170px;
height:170px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
margin-bottom:20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.bio{
font-size:18px;
line-height:1.8;
color:#ddd;
margin-bottom:30px;
}

.social{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.social a{
text-decoration:none;
background:#2563eb;
color:white;
padding:15px;
border-radius:15px;
font-size:18px;
font-weight:bold;
transition:.3s;
}

.social a:hover{
transform:translateY(-5px);
background:#1d4ed8;
}

footer{
margin-top:30px;
color:#ccc;
}

</style>

</head>

<body>
