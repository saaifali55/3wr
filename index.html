<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الصفحة الرسمية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cairo',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:450px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
border-radius:25px;
padding:35px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

.avatar{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid #38bdf8;
margin-bottom:20px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

.bio{
color:#cbd5e1;
line-height:1.8;
margin-bottom:25px;
}

.social{
display:flex;
flex-direction:column;
gap:15px;
}

.social a{
text-decoration:none;
color:white;
padding:15px;
border-radius:15px;
font-weight:bold;
transition:.3s;
background:#1e40af;
}

.social a:hover{
transform:translateY(-3px);
background:#2563eb;
}

footer{
margin-top:25px;
font-size:14px;
color:#94a3b8;
}

</style>
</head>
<body>

<div class="card">

<img src="father.jpg" class="avatar">

<h1>ابو حسن الفريجي</h1>

<p class="bio">
مرحباً بكم في الصفحة الرسمية.
يمكنكم متابعة جميع الحسابات والتواصل عبر الروابط التالية.
</p>

<div class="social">

</div>

<footer>
© جميع الحقوق محفوظة
</footer>

</div>

</body>
</html>
